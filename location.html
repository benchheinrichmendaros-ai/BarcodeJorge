<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location &amp; Contact — Barco de Jorge</title>
  <meta
    name="description"
    content="Find Barco de Jorge in Sangat, San Fernando, Cebu. See our hours, phone number, and directions."
  />
  <link rel="icon" href="images/logo.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header" data-site-header></header>

  <main id="main">
    <section class="page-banner bokeh-bg">
      <div class="container">
        <h1>Location &amp; Contact</h1>
        <p>Come say hi — here's how to find us and reach us.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="location-grid">
          <!-- Contact + Hours: edit these in js/site-data.js -->
          <div>
            <div class="contact-card" style="margin-bottom: 24px;">
              <h3>Visit Us</h3>
              <ul class="contact-list">
                <li>
                  <span class="icon" aria-hidden="true">📍</span>
                  <span data-field="address"></span>
                </li>
                <li>
                  <span class="icon" aria-hidden="true">📞</span>
                  <a data-link="phone" data-field="phone"></a>
                </li>
                <li>
                  <span class="icon" aria-hidden="true">✉️</span>
                  <a data-link="email"></a>
                </li>
              </ul>
              <a class="btn btn--gold btn--block" data-link="maps">Get Directions</a>
            </div>

            <div class="contact-card">
              <h3>Hours</h3>
              <table class="hours-table">
                <tbody data-hours-table></tbody>
              </table>
            </div>
          </div>

          <!-- Map: builds automatically from the address in
               js/site-data.js — no API key needed. -->
          <div class="contact-card" style="padding: 0; overflow: hidden;">
            <iframe
              class="map-embed"
              data-map-embed
              loading="lazy"
              title="Map to Barco de Jorge"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>
      </div>
    </section>

    <section class="section" style="padding-top: 0;">
      <div class="container" style="text-align: center;">
        <p class="section-intro" style="margin: 0 auto 16px;">
          Prefer to order ahead, or have a question before you visit?
        </p>
        <div class="cta-row" style="justify-content: center;">
          <a class="btn btn--gold" href="order-policy.html">Order Online</a>
          <a class="btn btn--outline-dark" data-link="messenger">Chat Us</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer bokeh-bg" data-site-footer></footer>

  <script src="js/site-data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
